<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: #f5f5f5; padding: 20px 24px; }
.row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.label { font-size: 10px; font-weight: 600; color: #8c8c8c; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }
.btn { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 14px; padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: #006400; color: #fff; }
.btn-primary:hover { background: #1A8C2E; }
.btn-secondary { background: #E8F5EC; color: #006400; }
.btn-outline { background: transparent; color: #006400; border: 1.5px solid #006400; }
.btn-danger { background: #CE1126; color: #fff; }
.btn-ghost { background: transparent; color: #5A5A5A; }
.btn-disabled { background: #C8C8C8; color: #8C8C8C; cursor: not-allowed; }
.btn-sm { font-size: 12px; padding: 6px 14px; }
.btn-lg { font-size: 16px; padding: 13px 28px; }
.btn-pill { border-radius: 9999px; }
.btn-icon { padding: 10px; border-radius: 6px; background: #E8F5EC; color: #006400; }
</style>
</head><body>
<div class="label">Primary</div>
<div class="row">
  <button class="btn btn-primary">Send Money</button>
  <button class="btn btn-primary btn-sm">Send</button>
  <button class="btn btn-primary btn-lg">Get Started</button>
  <button class="btn btn-primary btn-pill">Apply Now</button>
  <button class="btn btn-disabled" disabled>Disabled</button>
</div>
<div class="label">Secondary & Outline</div>
<div class="row">
  <button class="btn btn-secondary">View Jobs</button>
  <button class="btn btn-outline">Learn More</button>
  <button class="btn btn-ghost">Cancel</button>
  <button class="btn btn-danger">Delete Account</button>
</div>
<div class="label">With Icon (Lucide CDN)</div>
<div class="row">
  <button class="btn btn-primary" style="gap:8px">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    Continue
  </button>
  <button class="btn btn-secondary" style="gap:8px">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19.5 2.5S18 2 16.5 3.5L13 7 4.8 5.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
    Track Flight
  </button>
  <button class="btn btn-icon">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  </button>
</div>
</body></html>
