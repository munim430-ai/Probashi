<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: #fff; padding: 20px; }
.row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.swatch { display: flex; flex-direction: column; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.08); width: 110px; }
.swatch-color { height: 64px; }
.swatch-info { padding: 7px 9px; background: #fff; }
.swatch-name { font-size: 11px; font-weight: 600; color: #1a1a1a; }
.swatch-hex  { font-size: 10px; color: #5a5a5a; font-family: monospace; }
.label { font-size: 11px; font-weight: 600; color: #8c8c8c; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
</style>
</head><body>
<div class="label">Brand Green</div>
<div class="row">
  <div class="swatch"><div class="swatch-color" style="background:#004d00"></div><div class="swatch-info"><div class="swatch-name">Green 700</div><div class="swatch-hex">#004d00</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#006400"></div><div class="swatch-info"><div class="swatch-name">Green 600 ★</div><div class="swatch-hex">#006400</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#1A8C2E"></div><div class="swatch-info"><div class="swatch-name">Green 500</div><div class="swatch-hex">#1A8C2E</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#34A84A"></div><div class="swatch-info"><div class="swatch-name">Green 400</div><div class="swatch-hex">#34A84A</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#C8EDCF"></div><div class="swatch-info"><div class="swatch-name">Green 100</div><div class="swatch-hex">#C8EDCF</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#E8F5EC"></div><div class="swatch-info"><div class="swatch-name">Green 50</div><div class="swatch-hex">#E8F5EC</div></div></div>
</div>
<div class="label">Brand Red</div>
<div class="row">
  <div class="swatch"><div class="swatch-color" style="background:#A00D1E"></div><div class="swatch-info"><div class="swatch-name">Red 700</div><div class="swatch-hex">#A00D1E</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#CE1126"></div><div class="swatch-info"><div class="swatch-name">Red 600 ★</div><div class="swatch-hex">#CE1126</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#E02236"></div><div class="swatch-info"><div class="swatch-name">Red 500</div><div class="swatch-hex">#E02236</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#F5C6CB"></div><div class="swatch-info"><div class="swatch-name">Red 100</div><div class="swatch-hex">#F5C6CB</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#F5E6E9"></div><div class="swatch-info"><div class="swatch-name">Red 50</div><div class="swatch-hex">#F5E6E9</div></div></div>
</div>
<div class="label">Gold (Remittance)</div>
<div class="row">
  <div class="swatch"><div class="swatch-color" style="background:#C8881A"></div><div class="swatch-info"><div class="swatch-name">Gold 600</div><div class="swatch-hex">#C8881A</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#F4A832"></div><div class="swatch-info"><div class="swatch-name">Gold 500 ★</div><div class="swatch-hex">#F4A832</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#FEF7E8"></div><div class="swatch-info"><div class="swatch-name">Gold 50</div><div class="swatch-hex">#FEF7E8</div></div></div>
</div>
</body></html>
