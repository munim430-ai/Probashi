<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: #f5f5f5; padding: 20px 24px; }
.row { display: flex; gap: 14px; flex-wrap: wrap; }
.card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
/* Transfer card */
.tc { width: 220px; padding: 16px; }
.tc-label { font-size: 11px; font-weight: 600; color: #8C8C8C; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.tc-amount { font-size: 28px; font-weight: 800; color: #1A1A1A; line-height: 1; }
.tc-currency { font-size: 14px; font-weight: 600; color: #5A5A5A; margin-left: 4px; }
.tc-row { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
.tc-badge { font-size: 10px; font-weight: 600; background: #E8F5EC; color: #006400; padding: 2px 8px; border-radius: 9999px; }
.tc-date { font-size: 11px; color: #8C8C8C; }
/* Job card */
.jc { width: 220px; }
.jc-header { background: #006400; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
.jc-avatar { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.jc-title { font-size: 14px; font-weight: 700; color: #fff; }
.jc-co { font-size: 11px; color: rgba(255,255,255,0.75); }
.jc-body { padding: 12px 16px; }
.jc-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.jc-tag { font-size: 10px; font-weight: 600; background: #E8F5EC; color: #006400; padding: 2px 8px; border-radius: 9999px; }
.jc-sal { font-size: 13px; font-weight: 700; color: #F4A832; }
.jc-apply { display: block; text-align: center; margin-top: 10px; font-size: 13px; font-weight: 600; color: #fff; background: #006400; padding: 8px; border-radius: 6px; }
/* Alert card */
.ac { width: 220px; padding: 14px 16px; border-left: 3px solid #CE1126; }
.ac-title { font-size: 13px; font-weight: 700; color: #CE1126; margin-bottom: 4px; }
.ac-body { font-size: 12px; color: #5A5A5A; line-height: 1.5; }
</style>
</head><body>
<div class="row">
  <div class="card tc">
    <div class="tc-label">Transfer</div>
    <div><span class="tc-amount">12,500</span><span class="tc-currency">BDT</span></div>
    <div class="tc-row">
      <span class="tc-badge">VERIFIED</span>
      <span class="tc-date">Apr 12, 2026</span>
    </div>
    <div style="margin-top:10px;font-size:12px;color:#8C8C8C">To: Rina Begum · bKash</div>
  </div>
  <div class="card jc">
    <div class="jc-header">
      <div class="jc-avatar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
      </div>
      <div><div class="jc-title">Electrician</div><div class="jc-co">Al-Rashid Group · KSA</div></div>
    </div>
    <div class="jc-body">
      <div class="jc-row">
        <span class="jc-tag">VERIFIED</span>
        <span class="jc-tag">2yr contract</span>
      </div>
      <div class="jc-sal">SAR 1,800/mo</div>
      <a class="jc-apply">Apply Now</a>
    </div>
  </div>
  <div class="card ac">
    <div class="ac-title">Document Expiry</div>
    <div class="ac-body">Your work visa expires in <strong>14 days</strong>. Renew immediately to avoid issues.</div>
    <div style="margin-top:8px;font-size:12px;font-weight:600;color:#CE1126;cursor:pointer">Renew now →</div>
  </div>
</div>
</body></html>
