<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Noto+Sans+Bengali:wght@600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: #f5f5f5; padding: 24px; }
.row { display: flex; gap: 24px; flex-wrap: wrap; align-items: center; margin-bottom: 24px; }
.bg-dark { background: #006400; padding: 18px 24px; border-radius: 12px; }
.bg-light { background: #fff; padding: 18px 24px; border-radius: 12px; border: 1px solid #e0e0e0; }
.logo-mark { display: flex; align-items: center; gap: 12px; }
.mark-circle { width: 48px; height: 48px; border-radius: 50%; background: #006400; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.mark-inner { width: 27px; height: 27px; border-radius: 50%; background: #CE1126; display: flex; align-items: center; justify-content: center; }
.wordmark-en { font-size: 22px; font-weight: 800; color: #006400; letter-spacing: -0.02em; line-height: 1; }
.wordmark-bn { font-family: 'Noto Sans Bengali', serif; font-size: 15px; font-weight: 600; color: #CE1126; line-height: 1; }
.label { font-size: 10px; font-weight: 600; color: #8c8c8c; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
</style>
</head><body>
<div class="label">Full Logo — On Light</div>
<div class="bg-light" style="margin-bottom:16px">
  <div class="logo-mark">
    <div style="width:48px;height:48px;position:relative">
      <div style="width:48px;height:48px;border-radius:50%;background:#006400;display:flex;align-items:center;justify-content:center">
        <div style="width:27px;height:27px;border-radius:50%;background:#CE1126;display:flex;align-items:center;justify-content:center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="9" width="16" height="12" rx="2"/><path d="M8 9V7a4 4 0 0 1 8 0v2"/><line x1="12" y1="13" x2="12" y2="17"/></svg>
        </div>
      </div>
    </div>
    <div>
      <div class="wordmark-en">Deshantari</div>
      <div class="wordmark-bn">দেশান্তরী</div>
    </div>
  </div>
</div>

<div class="label">Full Logo — On Brand Green</div>
<div class="bg-dark" style="margin-bottom:16px">
  <div class="logo-mark">
    <div style="width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center">
      <div style="width:27px;height:27px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#006400" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="9" width="16" height="12" rx="2"/><path d="M8 9V7a4 4 0 0 1 8 0v2"/><line x1="12" y1="13" x2="12" y2="17"/></svg>
      </div>
    </div>
    <div>
      <div style="font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.02em;line-height:1">Deshantari</div>
      <div style="font-family:'Noto Sans Bengali',serif;font-size:15px;font-weight:600;color:rgba(255,255,255,0.75);line-height:1.2">দেশান্তরী</div>
    </div>
  </div>
</div>

<div class="label">Mark Only · Three Sizes</div>
<div style="display:flex;gap:16px;align-items:flex-end">
  <div style="width:32px;height:32px;border-radius:50%;background:#006400;display:flex;align-items:center;justify-content:center"><div style="width:18px;height:18px;border-radius:50%;background:#CE1126"></div></div>
  <div style="width:48px;height:48px;border-radius:50%;background:#006400;display:flex;align-items:center;justify-content:center"><div style="width:27px;height:27px;border-radius:50%;background:#CE1126"></div></div>
  <div style="width:72px;height:72px;border-radius:50%;background:#006400;display:flex;align-items:center;justify-content:center"><div style="width:40px;height:40px;border-radius:50%;background:#CE1126"></div></div>
</div>
</body></html>
