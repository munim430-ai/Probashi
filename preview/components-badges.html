<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: #f5f5f5; padding: 20px 24px; }
.label { font-size: 10px; font-weight: 600; color: #8c8c8c; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }
.row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 9999px; }
.dot { width: 6px; height: 6px; border-radius: 50%; }
</style>
</head><body>
<div class="label">Status</div>
<div class="row">
  <span class="badge" style="background:#E8F5EC;color:#006400"><span class="dot" style="background:#006400"></span>VERIFIED</span>
  <span class="badge" style="background:#FEF7E8;color:#C8881A"><span class="dot" style="background:#F4A832"></span>PROCESSING</span>
  <span class="badge" style="background:#F5E6E9;color:#CE1126"><span class="dot" style="background:#CE1126"></span>PENDING</span>
  <span class="badge" style="background:#F5F5F5;color:#5A5A5A"><span class="dot" style="background:#C8C8C8"></span>EXPIRED</span>
  <span class="badge" style="background:#E8F0FE;color:#1A56DB"><span class="dot" style="background:#1A56DB"></span>NEW</span>
</div>
<div class="label">Category Tags</div>
<div class="row">
  <span class="badge" style="background:#E8F5EC;color:#006400">Remittance</span>
  <span class="badge" style="background:#E8F0FE;color:#1A56DB">Jobs</span>
  <span class="badge" style="background:#FEF7E8;color:#C8881A">Documents</span>
  <span class="badge" style="background:#F5E6E9;color:#CE1126">Emergency</span>
  <span class="badge" style="background:#F0F0FF;color:#5B4FC8">Community</span>
</div>
<div class="label">Notification Badges</div>
<div class="row">
  <div style="position:relative;display:inline-block">
    <div style="width:40px;height:40px;background:#E8F5EC;border-radius:10px;display:flex;align-items:center;justify-content:center">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#006400" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </div>
    <span style="position:absolute;top:-4px;right:-4px;background:#CE1126;color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:9999px;display:flex;align-items:center;justify-content:center;border:2px solid #f5f5f5">3</span>
  </div>
  <div style="position:relative;display:inline-block">
    <div style="width:40px;height:40px;background:#E8F5EC;border-radius:10px;display:flex;align-items:center;justify-content:center">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#006400" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <span style="position:absolute;top:-4px;right:-4px;background:#CE1126;color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:9999px;display:flex;align-items:center;justify-content:center;border:2px solid #f5f5f5">12</span>
  </div>
</div>
<div class="label">Progress</div>
<div style="max-width:280px">
  <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;color:#5A5A5A">Profile completion</span><span style="font-size:12px;font-weight:600;color:#006400">72%</span></div>
  <div style="height:8px;background:#E0E0E0;border-radius:9999px;overflow:hidden">
    <div style="width:72%;height:100%;background:#006400;border-radius:9999px"></div>
  </div>
</div>
</body></html>
