<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: #f5f5f5; padding: 20px 24px; }
.label { font-size: 10px; font-weight: 600; color: #8c8c8c; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }
.phone-wrap { display: flex; gap: 20px; flex-wrap: wrap; }
.phone { width: 220px; background: #fff; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); overflow: hidden; }
/* Top header */
.app-header { background: #006400; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
.app-header-title { font-size: 16px; font-weight: 700; color: #fff; }
.app-header-right { display: flex; gap: 8px; align-items: center; }
.header-icon { width: 32px; height: 32px; background: rgba(255,255,255,0.15); border-radius: 9999px; display: flex; align-items: center; justify-content: center; }
/* Bottom nav */
.bottom-nav { background: #fff; border-top: 1px solid #E0E0E0; display: flex; padding: 8px 0 4px; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 0; cursor: pointer; }
.nav-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.nav-label { font-size: 9px; font-weight: 500; color: #8C8C8C; }
.nav-item.active .nav-label { color: #006400; font-weight: 600; }
.nav-dot { width: 4px; height: 4px; border-radius: 50%; background: #006400; }
/* Page body placeholder */
.page-body { padding: 14px; min-height: 80px; background: #f5f5f5; }
</style>
</head><body>
<div class="label">App Header + Bottom Navigation</div>
<div class="phone-wrap">
  <div class="phone">
    <div class="app-header">
      <div style="display:flex;align-items:center;gap:8px">
        <svg width="22" height="22" viewBox="0 0 60 60" fill="none"><circle cx="30" cy="30" r="28" fill="rgba(255,255,255,0.2)"/><circle cx="30" cy="30" r="16" fill="white"/><rect x="22" y="27" width="16" height="12" rx="2" fill="#006400"/><path d="M26 24h8v3h-8z" fill="#006400" opacity="0.6"/></svg>
        <span class="app-header-title">Deshantari</span>
      </div>
      <div class="app-header-right">
        <div class="header-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <div class="header-icon" style="width:28px;height:28px;background:#CE1126;font-size:12px;font-weight:700;color:white">R</div>
      </div>
    </div>
    <div class="page-body">
      <div style="height:12px;background:#E0E0E0;border-radius:6px;width:60%;margin-bottom:8px"></div>
      <div style="height:10px;background:#E0E0E0;border-radius:6px;width:80%;margin-bottom:8px"></div>
      <div style="height:10px;background:#E0E0E0;border-radius:6px;width:45%"></div>
    </div>
    <div class="bottom-nav">
      <div class="nav-item active">
        <div class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#006400" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
        <div class="nav-label" style="color:#006400">Home</div>
        <div class="nav-dot"></div>
      </div>
      <div class="nav-item">
        <div class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8C8C8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
        <div class="nav-label">Send</div>
      </div>
      <div class="nav-item">
        <div class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8C8C8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg></div>
        <div class="nav-label">Jobs</div>
      </div>
      <div class="nav-item">
        <div class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8C8C8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        <div class="nav-label">Docs</div>
      </div>
      <div class="nav-item">
        <div class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8C8C8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <div class="nav-label">Profile</div>
      </div>
    </div>
  </div>
</div>
</body></html>
