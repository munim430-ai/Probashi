<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: #f5f5f5; padding: 20px 24px; }
.row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; align-items: flex-end; }
.box-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.box { background: white; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #8c8c8c; font-weight: 600; }
.lbl { font-size: 10px; font-weight: 600; color: #5a5a5a; text-align: center; }
.sub { font-size: 9px; color: #8c8c8c; text-align: center; }
.label { font-size: 10px; font-weight: 600; color: #8c8c8c; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }
.shadow-row { display: flex; gap: 16px; flex-wrap: wrap; }
.shadow-box { background: white; width: 80px; height: 56px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
</style>
</head><body>
<div class="label">Corner Radii</div>
<div class="row">
  <div class="box-wrap"><div class="box" style="width:64px;height:48px;border:2px solid #006400;border-radius:6px">sm</div><div class="lbl">Small</div><div class="sub">6px · inputs</div></div>
  <div class="box-wrap"><div class="box" style="width:64px;height:48px;border:2px solid #006400;border-radius:12px">md</div><div class="lbl">Medium</div><div class="sub">12px · cards</div></div>
  <div class="box-wrap"><div class="box" style="width:64px;height:48px;border:2px solid #006400;border-radius:20px">lg</div><div class="lbl">Large</div><div class="sub">20px · sheets</div></div>
  <div class="box-wrap"><div class="box" style="width:64px;height:48px;border:2px solid #006400;border-radius:9999px">pill</div><div class="lbl">Full</div><div class="sub">9999px · pills</div></div>
</div>
<div class="label">Shadows</div>
<div class="shadow-row">
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div class="shadow-box" style="box-shadow:0 2px 8px rgba(0,0,0,0.08)"><div style="font-size:10px;font-weight:600;color:#5a5a5a">Card</div><div style="font-size:9px;color:#8c8c8c">0 2 8 · 8%</div></div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div class="shadow-box" style="box-shadow:0 8px 24px rgba(0,0,0,0.12)"><div style="font-size:10px;font-weight:600;color:#5a5a5a">Elevated</div><div style="font-size:9px;color:#8c8c8c">0 8 24 · 12%</div></div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div class="shadow-box" style="box-shadow:0 0 0 3px rgba(0,100,0,0.25)"><div style="font-size:10px;font-weight:600;color:#006400">Focus</div><div style="font-size:9px;color:#8c8c8c">0 0 0 3 · green</div></div>
  </div>
</div>
</body></html>
