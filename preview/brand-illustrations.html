<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Noto+Sans+Bengali:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: #f5f5f5; padding: 20px 24px; }
.row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
.label { font-size: 10px; font-weight: 600; color: #8c8c8c; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }
.tile { background: #fff; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); width: 100px; }
.tile svg { color: #006400; }
.tile-label { font-size: 11px; font-weight: 500; color: #5A5A5A; text-align: center; }
.hero { background: #006400; border-radius: 16px; padding: 20px 24px; display: flex; flex-direction: column; gap: 6px; }
</style>
</head><body>
<div class="label">Core Icons (Lucide, stroke 1.5)</div>
<div class="row">
  <div class="tile">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#006400" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
    <span class="tile-label">Send Money</span>
  </div>
  <div class="tile">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#006400" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19.5 2.5S18 2 16.5 3.5L13 7 4.8 5.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
    <span class="tile-label">Flight</span>
  </div>
  <div class="tile">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#006400" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
    <span class="tile-label">Jobs</span>
  </div>
  <div class="tile">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#006400" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    <span class="tile-label">Documents</span>
  </div>
  <div class="tile">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#CE1126" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.7 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.61 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.07 6.07l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 17z"/></svg>
    <span class="tile-label">Emergency</span>
  </div>
  <div class="tile">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#006400" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <span class="tile-label">Community</span>
  </div>
  <div class="tile">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#F4A832" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    <span class="tile-label">Remittance</span>
  </div>
  <div class="tile">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#006400" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span class="tile-label">Track</span>
  </div>
</div>
<div class="label">Hero Motif — Bangladesh Flag Colors</div>
<div class="hero">
  <div style="display:flex;gap:12px;align-items:center">
    <div style="width:56px;height:56px;border-radius:50%;background:#CE1126;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19.5 2.5S18 2 16.5 3.5L13 7 4.8 5.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
    </div>
    <div>
      <div style="font-size:18px;font-weight:800;color:#fff">বাড়িতে ফেরার পথ</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.75);margin-top:2px">Your journey home, supported.</div>
    </div>
  </div>
</div>
</body></html>
