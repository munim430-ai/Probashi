<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: #fff; padding: 20px; }
.row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.swatch { display: flex; flex-direction: column; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.08); width: 96px; }
.swatch-color { height: 56px; }
.swatch-info { padding: 6px 8px; background: #fff; }
.swatch-name { font-size: 11px; font-weight: 600; color: #1a1a1a; }
.swatch-hex  { font-size: 10px; color: #5a5a5a; font-family: monospace; }
.label { font-size: 11px; font-weight: 600; color: #8c8c8c; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
</style>
</head><body>
<div class="label">Neutral Scale</div>
<div class="row">
  <div class="swatch"><div class="swatch-color" style="background:#1A1A1A"></div><div class="swatch-info"><div class="swatch-name">900</div><div class="swatch-hex">#1A1A1A</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#2E2E2E"></div><div class="swatch-info"><div class="swatch-name">800</div><div class="swatch-hex">#2E2E2E</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#424242"></div><div class="swatch-info"><div class="swatch-name">700</div><div class="swatch-hex">#424242</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#5A5A5A"></div><div class="swatch-info"><div class="swatch-name">600</div><div class="swatch-hex">#5A5A5A</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#8C8C8C"></div><div class="swatch-info"><div class="swatch-name">400</div><div class="swatch-hex">#8C8C8C</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#C8C8C8"></div><div class="swatch-info"><div class="swatch-name">300</div><div class="swatch-hex">#C8C8C8</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#E0E0E0; border: 1px solid #eee"></div><div class="swatch-info"><div class="swatch-name">200</div><div class="swatch-hex">#E0E0E0</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#F5F5F5; border: 1px solid #eee"></div><div class="swatch-info"><div class="swatch-name">100</div><div class="swatch-hex">#F5F5F5</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#FAFAFA; border: 1px solid #eee"></div><div class="swatch-info"><div class="swatch-name">50</div><div class="swatch-hex">#FAFAFA</div></div></div>
</div>
</body></html>
