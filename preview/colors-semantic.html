<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: #fff; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.chip { border-radius: 8px; padding: 10px 12px; }
.chip-label { font-size: 11px; font-weight: 600; margin-bottom: 2px; }
.chip-desc { font-size: 10px; opacity: 0.75; }
.section-label { font-size: 11px; font-weight: 600; color: #8c8c8c; letter-spacing: .06em; text-transform: uppercase; margin: 0 0 8px; }
.mb { margin-bottom: 14px; }
</style>
</head><body>
<div class="section-label mb">Text</div>
<div class="grid mb">
  <div class="chip" style="background:#f5f5f5"><div class="chip-label" style="color:#1A1A1A">Primary</div><div class="chip-desc" style="color:#5a5a5a">#1A1A1A · Headings, body</div></div>
  <div class="chip" style="background:#f5f5f5"><div class="chip-label" style="color:#5A5A5A">Secondary</div><div class="chip-desc" style="color:#8c8c8c">#5A5A5A · Subtitles</div></div>
  <div class="chip" style="background:#f5f5f5"><div class="chip-label" style="color:#8C8C8C">Tertiary</div><div class="chip-desc" style="color:#8c8c8c">#8C8C8C · Captions</div></div>
  <div class="chip" style="background:#006400"><div class="chip-label" style="color:#fff">Inverse</div><div class="chip-desc" style="color:rgba(255,255,255,0.7)">#FFF · On dark</div></div>
  <div class="chip" style="background:#E8F5EC"><div class="chip-label" style="color:#006400">Link</div><div class="chip-desc" style="color:#5a5a5a">#006400 · Anchors</div></div>
  <div class="chip" style="background:#F5E6E9"><div class="chip-label" style="color:#CE1126">Danger</div><div class="chip-desc" style="color:#5a5a5a">#CE1126 · Errors</div></div>
  <div class="chip" style="background:#E8F5EC"><div class="chip-label" style="color:#006400">Success</div><div class="chip-desc" style="color:#5a5a5a">#006400</div></div>
  <div class="chip" style="background:#FEF7E8"><div class="chip-label" style="color:#C8881A">Warning</div><div class="chip-desc" style="color:#5a5a5a">#C8881A</div></div>
</div>
<div class="section-label mb">Status Badges</div>
<div style="display:flex;gap:8px;flex-wrap:wrap">
  <span style="background:#E8F5EC;color:#006400;font-size:11px;font-weight:600;padding:3px 10px;border-radius:9999px">VERIFIED</span>
  <span style="background:#F5E6E9;color:#CE1126;font-size:11px;font-weight:600;padding:3px 10px;border-radius:9999px">PENDING</span>
  <span style="background:#FEF7E8;color:#C8881A;font-size:11px;font-weight:600;padding:3px 10px;border-radius:9999px">PROCESSING</span>
  <span style="background:#f5f5f5;color:#5A5A5A;font-size:11px;font-weight:600;padding:3px 10px;border-radius:9999px">INACTIVE</span>
  <span style="background:#E8F0FE;color:#1A56DB;font-size:11px;font-weight:600;padding:3px 10px;border-radius:9999px">NEW</span>
</div>
</body></html>
