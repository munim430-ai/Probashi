<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Probashi UI Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Noto+Sans+Bengali:wght@400;500;600;700&family=Galada&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family:'Poppins',sans-serif; background:#1a1a1a; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; gap:32px; }
.phone { width:375px; height:752px; background:white; border-radius:44px; box-shadow:0 32px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.08),inset 0 0 0 1px rgba(0,0,0,0.2); overflow:hidden; display:flex; flex-direction:column; flex-shrink:0; }
.scroll { flex:1; overflow-y:auto; overflow-x:hidden; }
.scroll::-webkit-scrollbar { display:none; }
.label-pill { position:absolute; bottom:-28px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.5); font-size:11px; font-weight:600; padding:4px 14px; border-radius:9999px; white-space:nowrap; font-family:'Poppins',sans-serif; }
</style>
</head>
<body>
<div class="phone" id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── SHARED ICONS ──────────────────────────────────────────────
const IC = {
  home:    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  send:    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>,
  jobs:    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>,
  more:    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="5" cy="12" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="19" cy="12" r="1" fill="currentColor"/></svg>,
  profile: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  bell:    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
  back:    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>,
  check:   <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#006400" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
  arrow:   <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>,
  search:  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8C8C8C" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
  warn:    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#CE1126" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
  mic:     <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>,
  shield:  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  users:   <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  docs:    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>,
  chev:    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>,
};

const Badge = ({ label, color, bg }) => (
  <span style={{ fontSize:10, fontWeight:700, background:bg, color, padding:'2px 8px', borderRadius:9999 }}>{label}</span>
);

// ── HEADER ────────────────────────────────────────────────────
const Header = ({ showBack, title, onBack, sub }) => (
  <div style={{ background:'#006400', padding:'12px 16px', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0, minHeight:56 }}>
    <div style={{ display:'flex', alignItems:'center', gap:10 }}>
      {showBack ? (
        <button onClick={onBack} style={{ background:'rgba(255,255,255,0.15)', border:'none', borderRadius:'50%', width:34, height:34, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:'white' }}>{IC.back}</button>
      ) : (
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <div style={{ width:30, height:30, borderRadius:'50%', background:'rgba(255,255,255,0.15)', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <div style={{ width:17, height:17, borderRadius:'50%', background:'#CE1126' }} />
          </div>
          <div style={{ display:'flex', alignItems:'baseline', gap:4 }}>
            <span style={{ color:'white', fontWeight:800, fontSize:18, letterSpacing:'-0.02em' }}>Probashi</span>
            <span style={{ fontFamily:'Galada, serif', fontSize:15, color:'rgba(255,255,255,0.75)' }}>প্রবাসী</span>
          </div>
        </div>
      )}
      {showBack && (
        <div>
          <div style={{ color:'white', fontWeight:700, fontSize:15 }}>{title}</div>
          {sub && <div style={{ color:'rgba(255,255,255,0.65)', fontSize:11 }}>{sub}</div>}
        </div>
      )}
    </div>
    <div style={{ display:'flex', gap:8, alignItems:'center' }}>
      <button style={{ position:'relative', background:'rgba(255,255,255,0.15)', border:'none', borderRadius:'50%', width:34, height:34, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:'white' }}>
        {IC.bell}
        <span style={{ position:'absolute', top:-2, right:-2, background:'#CE1126', color:'white', fontSize:9, fontWeight:700, minWidth:16, height:16, borderRadius:9999, display:'flex', alignItems:'center', justifyContent:'center', border:'2px solid #006400' }}>2</span>
      </button>
      <div style={{ width:32, height:32, borderRadius:'50%', background:'#CE1126', display:'flex', alignItems:'center', justifyContent:'center', color:'white', fontWeight:700, fontSize:13 }}>R</div>
    </div>
  </div>
);

// ── BOTTOM NAV ────────────────────────────────────────────────
const NAV = [
  { id:'home',    label:'Home',    icon:IC.home    },
  { id:'send',    label:'Send',    icon:IC.send    },
  { id:'jobs',    label:'Jobs',    icon:IC.jobs    },
  { id:'more',    label:'More',    icon:IC.more    },
  { id:'profile', label:'Profile', icon:IC.profile },
];
const BottomNav = ({ active, onNavigate }) => (
  <div style={{ background:'white', borderTop:'1px solid #E0E0E0', display:'flex', flexShrink:0, paddingBottom:8 }}>
    {NAV.map(item => {
      const a = active === item.id;
      return (
        <button key={item.id} onClick={() => onNavigate(item.id)} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3, padding:'8px 0 4px', border:'none', background:'none', cursor:'pointer' }}>
          <div style={{ color:a?'#006400':'#8C8C8C' }}>{item.icon}</div>
          <span style={{ fontSize:10, fontWeight:a?600:500, color:a?'#006400':'#8C8C8C', fontFamily:'Poppins,sans-serif' }}>{item.label}</span>
          {a && <div style={{ width:4, height:4, borderRadius:'50%', background:'#006400' }} />}
        </button>
      );
    })}
  </div>
);

// ── HOME SCREEN ───────────────────────────────────────────────
const HomeScreen = ({ onNavigate }) => {
  const quickActions = [
    { id:'send',   label:'Send Money',  labelBn:'টাকা পাঠান',  color:'#006400', bg:'#E8F5EC', icon:IC.send    },
    { id:'jobs',   label:'Find Jobs',   labelBn:'চাকরি খুঁজুন', color:'#1A56DB', bg:'#E8F0FE', icon:IC.jobs    },
    { id:'social', label:'Community',   labelBn:'সম্প্রদায়',   color:'#7C3AED', bg:'#F0EBFF', icon:IC.users   },
    { id:'legal',  label:'Legal Help',  labelBn:'আইনি সাহায্য', color:'#CE1126', bg:'#F5E6E9', icon:IC.shield  },
  ];
  const transfers = [
    { name:'Rina Begum',    method:'bKash', amount:'৳12,500', status:'Delivered',  sc:'#006400', sb:'#E8F5EC', date:'Today'     },
    { name:'Karim Mia',     method:'Nagad', amount:'৳8,000',  status:'Processing', sc:'#C8881A', sb:'#FEF7E8', date:'Yesterday' },
    { name:'Fatema Khatun', method:'Bank',  amount:'৳25,000', status:'Delivered',  sc:'#006400', sb:'#E8F5EC', date:'Apr 10'    },
  ];
  return (
    <div style={{ background:'#F5F5F5' }}>
      <div style={{ background:'#006400', padding:'20px 20px 32px', position:'relative', overflow:'hidden' }}>
        <div style={{ position:'absolute', top:-40, right:-40, width:140, height:140, borderRadius:'50%', background:'rgba(206,17,38,0.18)' }} />
        <div style={{ position:'relative' }}>
          <div style={{ color:'rgba(255,255,255,0.75)', fontSize:13, fontWeight:500, marginBottom:4 }}>Available Balance</div>
          <div style={{ color:'white', fontSize:36, fontWeight:800, letterSpacing:'-0.02em', lineHeight:1 }}>SAR 4,280</div>
          <div style={{ color:'rgba(255,255,255,0.6)', fontSize:13, marginTop:4 }}>≈ ৳1,28,400</div>
          <div style={{ marginTop:16, display:'flex', gap:8 }}>
            <button onClick={() => onNavigate('send')} style={{ background:'white', color:'#006400', border:'none', borderRadius:8, padding:'9px 18px', fontFamily:'Poppins,sans-serif', fontWeight:700, fontSize:13, cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}>{IC.arrow} Send Home</button>
            <button style={{ background:'rgba(255,255,255,0.15)', color:'white', border:'1.5px solid rgba(255,255,255,0.3)', borderRadius:8, padding:'9px 16px', fontFamily:'Poppins,sans-serif', fontWeight:600, fontSize:13, cursor:'pointer' }}>Top Up</button>
          </div>
        </div>
      </div>
      <div style={{ padding:'0 16px', marginTop:-8 }}>
        <div style={{ background:'white', borderRadius:16, padding:16, boxShadow:'0 2px 12px rgba(0,0,0,0.08)', display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:8 }}>
          {quickActions.map(a => (
            <button key={a.id} onClick={() => onNavigate(a.id)} style={{ background:'none', border:'none', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:6, padding:'8px 4px' }}>
              <div style={{ width:48, height:48, borderRadius:14, background:a.bg, display:'flex', alignItems:'center', justifyContent:'center', color:a.color }}>{a.icon}</div>
              <span style={{ fontSize:11, fontWeight:600, color:'#1A1A1A', textAlign:'center', fontFamily:'Poppins,sans-serif', lineHeight:1.3 }}>{a.label}</span>
              <span style={{ fontSize:11, color:'#8C8C8C', fontFamily:'Galada, serif', lineHeight:1.3, textAlign:'center' }}>{a.labelBn}</span>
            </button>
          ))}
        </div>
      </div>
      <div style={{ margin:'14px 16px 0', background:'#F5E6E9', borderRadius:10, padding:'10px 14px', display:'flex', gap:10, alignItems:'flex-start' }}>
        {IC.warn}
        <div>
          <div style={{ fontSize:12, fontWeight:700, color:'#CE1126' }}>Iqama expires in 14 days</div>
          <div style={{ fontSize:11, color:'#5A5A5A', marginTop:2 }}>Renew your residence permit now. <span onClick={() => onNavigate('legal')} style={{ color:'#CE1126', fontWeight:600, cursor:'pointer' }}>Get legal help →</span></div>
        </div>
      </div>
      <div style={{ margin:'14px 16px 0', background:'white', borderRadius:12, padding:14, boxShadow:'0 2px 8px rgba(0,0,0,0.06)' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
          <span style={{ fontSize:13, fontWeight:700, color:'#1A1A1A' }}>New Job Match</span>
          <span onClick={() => onNavigate('jobs')} style={{ fontSize:12, fontWeight:600, color:'#006400', cursor:'pointer' }}>See all</span>
        </div>
        <div style={{ display:'flex', gap:12, alignItems:'center' }}>
          <div style={{ width:44, height:44, borderRadius:10, background:'#E8F5EC', display:'flex', alignItems:'center', justifyContent:'center', color:'#006400', flexShrink:0 }}>{IC.jobs}</div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:14, fontWeight:700, color:'#1A1A1A' }}>Construction Foreman</div>
            <div style={{ fontSize:12, color:'#5A5A5A', marginTop:2 }}>Al-Rashid Group · Dubai, UAE</div>
            <div style={{ fontSize:12, fontWeight:700, color:'#F4A832', marginTop:4 }}>AED 2,200/mo · Free accommodation</div>
          </div>
          <button onClick={() => onNavigate('jobs')} style={{ background:'#006400', color:'white', border:'none', borderRadius:8, padding:'7px 12px', fontFamily:'Poppins,sans-serif', fontWeight:600, fontSize:12, cursor:'pointer' }}>Apply</button>
        </div>
      </div>
      <div style={{ margin:'14px 16px 20px' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
          <span style={{ fontSize:13, fontWeight:700, color:'#1A1A1A' }}>Recent Transfers</span>
          <span onClick={() => onNavigate('send')} style={{ fontSize:12, fontWeight:600, color:'#006400', cursor:'pointer' }}>View all</span>
        </div>
        <div style={{ background:'white', borderRadius:12, boxShadow:'0 2px 8px rgba(0,0,0,0.06)', overflow:'hidden' }}>
          {transfers.map((t,i) => (
            <div key={i} style={{ padding:'12px 14px', display:'flex', alignItems:'center', gap:12, borderBottom:i<2?'1px solid #F0F0F0':'none' }}>
              <div style={{ width:38, height:38, borderRadius:'50%', background:'#E8F5EC', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:14, color:'#006400', flexShrink:0 }}>{t.name[0]}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:600, color:'#1A1A1A' }}>{t.name}</div>
                <div style={{ fontSize:11, color:'#8C8C8C', marginTop:2 }}>{t.method} · {t.date}</div>
              </div>
              <div style={{ textAlign:'right' }}>
                <div style={{ fontSize:14, fontWeight:700, color:'#1A1A1A' }}>{t.amount}</div>
                <Badge label={t.status} color={t.sc} bg={t.sb} />
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ── SEND MONEY ────────────────────────────────────────────────
const SendMoneyScreen = ({ onBack }) => {
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({ recipient:'', amount:'', method:'bKash', phone:'' });
  const [sent, setSent] = useState(false);
  const methods = ['bKash','Nagad','Bank Transfer','Rocket'];
  const rate = 22.8;
  const bdt = Math.round((parseFloat(form.amount)||0)*rate).toLocaleString();
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));
  const FInput = ({ label, value, onChange, placeholder, type='text' }) => (
    <div style={{ marginBottom:12 }}>
      <label style={{ display:'block', fontSize:12, fontWeight:600, color:'#5A5A5A', marginBottom:6, fontFamily:'Poppins,sans-serif' }}>{label}</label>
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{ width:'100%', fontFamily:'Poppins,sans-serif', fontSize:14, padding:'10px 12px', border:'1.5px solid #C8C8C8', borderRadius:8, outline:'none', color:'#1A1A1A', background:'white' }}
        onFocus={e=>{e.target.style.borderColor='#006400';e.target.style.boxShadow='0 0 0 3px rgba(0,100,0,0.12)';}}
        onBlur={e=>{e.target.style.borderColor='#C8C8C8';e.target.style.boxShadow='none';}} />
    </div>
  );
  const SD = ({ n }) => (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
      <div style={{ width:28, height:28, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', background:step>=n?'#006400':'#E0E0E0', color:step>=n?'white':'#8C8C8C', fontWeight:700, fontSize:13 }}>{step>n?'✓':n}</div>
      <span style={{ fontSize:10, color:step>=n?'#006400':'#8C8C8C', fontWeight:600, fontFamily:'Poppins,sans-serif' }}>{n===1?'Recipient':n===2?'Amount':'Confirm'}</span>
    </div>
  );
  if (sent) return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', background:'#F5F5F5', padding:24, gap:16 }}>
      <div style={{ width:72, height:72, borderRadius:'50%', background:'#E8F5EC', display:'flex', alignItems:'center', justifyContent:'center' }}>{IC.check}</div>
      <div style={{ textAlign:'center' }}>
        <div style={{ fontSize:20, fontWeight:800, color:'#1A1A1A' }}>Transfer Sent!</div>
        <div style={{ fontSize:14, color:'#5A5A5A', marginTop:4 }}>SAR {form.amount} → ৳{bdt}</div>
        <div style={{ fontSize:13, color:'#8C8C8C', marginTop:4 }}>To {form.recipient} via {form.method}</div>
      </div>
      <div style={{ background:'white', borderRadius:12, padding:'12px 16px', width:'100%', boxShadow:'0 2px 8px rgba(0,0,0,0.06)', fontSize:13, color:'#5A5A5A', textAlign:'center' }}>
        Delivery: <strong style={{ color:'#006400' }}>within 2 hours</strong>
      </div>
      <button onClick={() => { setSent(false); setStep(1); setForm({recipient:'',amount:'',method:'bKash',phone:''}); onBack(); }} style={{ background:'#006400', color:'white', border:'none', borderRadius:8, padding:'12px 32px', fontFamily:'Poppins,sans-serif', fontWeight:700, fontSize:14, cursor:'pointer', width:'100%' }}>Done</button>
    </div>
  );
  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', background:'#F5F5F5', overflow:'hidden' }}>
      <div style={{ background:'white', padding:'16px 20px', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 1px 4px rgba(0,0,0,0.06)' }}>
        <SD n={1}/><div style={{ height:2, width:40, background:step>1?'#006400':'#E0E0E0', margin:'0 4px 16px' }}/><SD n={2}/><div style={{ height:2, width:40, background:step>2?'#006400':'#E0E0E0', margin:'0 4px 16px' }}/><SD n={3}/>
      </div>
      <div style={{ flex:1, overflowY:'auto', padding:16 }}>
        {step===1 && <div style={{ background:'white', borderRadius:12, padding:16, boxShadow:'0 2px 8px rgba(0,0,0,0.06)' }}>
          <div style={{ fontSize:13, fontWeight:700, color:'#1A1A1A', marginBottom:14 }}>Who are you sending to?</div>
          <FInput label="Recipient Name" value={form.recipient} onChange={v=>upd('recipient',v)} placeholder="e.g. Rina Begum" />
          <FInput label="Mobile (Bangladesh)" value={form.phone} onChange={v=>upd('phone',v)} placeholder="017X XXXX XXXX" />
          <div style={{ fontSize:12, fontWeight:600, color:'#5A5A5A', marginBottom:8 }}>Transfer Method</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
            {methods.map(m=><button key={m} onClick={()=>upd('method',m)} style={{ border:`2px solid ${form.method===m?'#006400':'#E0E0E0'}`, background:form.method===m?'#E8F5EC':'white', borderRadius:8, padding:'10px 8px', cursor:'pointer', fontFamily:'Poppins,sans-serif', fontWeight:600, fontSize:13, color:form.method===m?'#006400':'#1A1A1A' }}>{m}</button>)}
          </div>
        </div>}
        {step===2 && <div style={{ background:'white', borderRadius:12, padding:16, boxShadow:'0 2px 8px rgba(0,0,0,0.06)' }}>

  return (
    <div style={{ background:'#F5F5F5' }}>
      <div style={{ background:'linear-gradient(135deg,#7C3AED,#5b21b6)', padding:'18px 18px 22px', position:'relative', overflow:'hidden' }}>

          <div style={{ fontSize:13, fontWeight:700, color:'#111', marginBottom:10 }}>Language Courses</div>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {courses.map((c,i)=>(
              <div key={c.lang} onClick={()=>setLesson(i)} style={{ background:'white', borderRadius:12, padding:14, boxShadow:'0 2px 8px rgba(0,0,0,0.05)', display:'flex', alignItems:'center', gap:12, cursor:'pointer' }}>

                <div style={{ color:'#ccc' }}>{IC.chev}</div>

        <div>

};

// ── APP ROOT ─────────────────────────────────────────────────
const ALL = ['home','send','jobs','more','profile','social','legal','skills','docs'];
const SHOW_BACK = ['send','social','legal','skills','docs'];
const BACK_TITLE = { send:'Send Money', social:'Community Hub', legal:'Legal Guardian', skills:'Voice Skills', docs:'Documents' };
const PARENT = { social:'more', legal:'more', skills:'more', docs:'more', send:'home' };

const App = () => {
  const saved = localStorage.getItem('pb_screen');
  const [screen, setScreen] = useState(ALL.includes(saved)?saved:'home');
  useEffect(()=>{ localStorage.setItem('pb_screen', screen); }, [screen]);

  const showBack = SHOW_BACK.includes(screen);
  const onBack = () => setScreen(PARENT[screen]||'home');

  return (
    <React.Fragment>
      {/* Status bar */}
      <div style={{ background:'#006400', padding:'8px 24px 4px', display:'flex', justifyContent:'space-between', alignItems:'center', flexShrink:0 }}>
        <span style={{ color:'white', fontSize:12, fontWeight:700 }}>9:41</span>
        <div style={{ display:'flex', gap:5, alignItems:'center' }}>
          <svg width="14" height="10" viewBox="0 0 24 16" fill="none"><rect x="0" y="2" width="20" height="11" rx="2" stroke="white" fill="none" strokeWidth="2"/><rect x="21" y="4" width="2" height="7" rx="1" fill="white"/><rect x="1" y="3" width="15" height="9" rx="1" fill="white"/></svg>
        </div>
      </div>
      <Header showBack={showBack} title={BACK_TITLE[screen]||''} onBack={onBack}/>
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {screen==='home'    && <div className="scroll"><HomeScreen onNavigate={setScreen}/></div>}
        {screen==='send'    && <SendMoneyScreen onBack={onBack}/>}
        {screen==='jobs'    && <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}><JobsScreen/></div>}
        {screen==='more'    && <div className="scroll"><MoreScreen onNavigate={setScreen}/></div>}
        {screen==='profile' && <div className="scroll"><ProfileScreen/></div>}
        {screen==='social'  && <div className="scroll"><SocialScreen/></div>}
        {screen==='legal'   && <div className="scroll"><LegalScreen/></div>}
        {screen==='skills'  && <div className="scroll"><VoiceSkillsScreen/></div>}
        {screen==='docs'    && <div className="scroll"><LegalScreen/></div>}
      </div>
      <BottomNav active={['more','social','legal','skills','docs'].includes(screen)?'more':screen} onNavigate={setScreen}/>
    </React.Fragment>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
